name: Gemini AI Updater

on:
  schedule:
    - cron: '*/30 * * * *' # Bot jalan otomatis tiap 30 menit
  workflow_dispatch:      # Tombol untuk jalankan manual jika mau

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Ambil Kode
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Library
        run: pip install google-generativeai pandas

      - name: Jalankan AI
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_signal.py

      - name: Simpan Perubahan ke CSV
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add ai_signal/ai_signal.csv
          git commit -m "Update Sinyal dari Gemini" || exit 0
          git push
