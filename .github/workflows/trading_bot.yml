name: Gemini AI Updater

on:
  workflow_dispatch:      # Tombol manual
  schedule:
    - cron: '0 * * * *'  # Jalan otomatis tiap jam

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # Memberi izin tulis secara paksa di level script
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install google-generativeai pandas

      - name: Run Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_signal.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add ai_signal.csv
          git commit -m "Update Sinyal Trading Otomatis" || exit 0
          git push origin main
